<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourbook - Recap de Puro Concierto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    
    <style>
        /* --- Variables de Paleta de Colores --- */
        :root {
            --bg-dark: #0D0D0F;
            --text-white: #FFFFFF;
            --pink-primary: #890050;
            --pink-light: #E00C78;
            --overlay-black: rgba(0, 0, 0, 0.4);
        }

        /* --- Estilos Generales --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Contenedor Principal (Revista / Landing) --- */
        .landing-container {
            position: relative;
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(to bottom, rgba(13, 13, 15, 0.2), var(--overlay-black)), url('lou portada.jpg') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
        }

        /* --- Header (Títulos Superiores) --- */
        header {
            text-align: center;
            width: 100%;
            z-index: 10;
        }

        .main-title {
            font-family: 'Syne', sans-serif;
            font-size: 4.2rem;
            font-weight: 800;
            letter-spacing: -2px;
            text-transform: uppercase;
            line-height: 0.9;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 12px rgba(0,0,0,0.8);
            word-spacing: -5px;
        }

        .subtitle {
            font-family: 'Syne', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.95;
            text-shadow: 1px 1px 6px rgba(0,0,0,0.8);
        }

        /* --- Contenido Central (Distribución de Textos) --- */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            margin: auto 0;
            width: 100%;
            z-index: 10;
        }

        /* Bloque Izquierdo */
        .quote-left {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.4rem;
            line-height: 1.05;
            letter-spacing: 1.5px;
            max-width: 420px;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.9);
        }

        /* Bloque Derecho */
        .artist-right {
            justify-self: end;
            text-align: right;
            max-width: 450px;
        }

        .artist-name {
            font-family: 'Syne', sans-serif;
            font-size: 3.2rem;
            font-weight: 800;
            color: var(--pink-light);
            text-transform: uppercase;
            letter-spacing: -1px;
            text-shadow: 0 0 15px var(--pink-primary), 2px 2px 5px rgba(0,0,0,0.9);
            line-height: 0.95;
            margin-bottom: 0.5rem;
        }

        .artist-subtext {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.1rem;
            letter-spacing: 1px;
            line-height: 1.1;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.9);
        }

        /* --- Footer (Info Inferior) --- */
        footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            width: 100%;
            z-index: 10;
            margin-top: 2rem;
        }

        .credits-author {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 2px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
        }

        /* Botón e indicador */
        .cta-audio-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            max-width: 300px;
        }

        .btn-buy {
            font-family: 'Bebas Neue', sans-serif;
            background-color: var(--text-white);
            color: var(--bg-dark);
            padding: 0.6rem 3rem;
            font-size: 1.4rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
            width: 100%;
            text-align: center;
        }

        .btn-buy:hover {
            transform: scale(1.03);
            background-color: #f0f0f0;
            box-shadow: 0 0 15px rgba(255,255,255,0.4);
        }

        .audio-status {
            font-size: 0.75rem;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            opacity: 0.8;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
        }

        /* Código de barras simulado */
        .barcode {
            display: flex;
            background-color: var(--text-white);
            padding: 5px 12px;
            height: 42px;
            align-items: center;
            border-radius: 1px;
        }
        
        .barcode span {
            display: inline-block;
            background-color: #000;
            height: 100%;
            margin-right: 2px;
        }
        .barcode span:nth-child(odd) { width: 1px; }
        .barcode span:nth-child(even) { width: 3px; }
        .barcode span:nth-child(3n) { width: 4px; }
        .barcode span:nth-child(4n) { width: 2px; }

        /* --- RESPONSIVIDAD --- */
        @media (min-width: 768px) {
            .landing-container {
                padding: 3rem;
            }

            .main-title {
                font-size: 6.5rem;
            }

            .content-grid {
                grid-template-columns: 1fr 1fr;
                align-items: center;
            }

            footer {
                flex-direction: row;
                justify-content: space-between;
                align-items: flex-end;
            }

            .cta-audio-container {
                order: 2;
            }

            .credits-author {
                order: 1;
                margin-bottom: 2px;
            }

            .barcode {
                order: 3;
            }
        }

        @media (max-width: 480px) {
            .main-title {
                font-size: 3.2rem;
            }
            .subtitle {
                font-size: 0.85rem;
                letter-spacing: 3px;
            }
            .quote-left {
                font-size: 1.9rem;
            }
            .artist-name {
                font-size: 2.5rem;
            }
            .artist-subtext {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==" type="audio/wav">
    </audio>

    <main class="landing-container">
        
        <header>
            <h1 class="main-title">Tourbook</h1>
            <p class="subtitle">Recap de Puro Concierto</p>
        </header>

        <div class="content-grid">
            <div class="quote-left">
                Podría escribir mi autobiografía, pero los conciertos son mejores
            </div>
            
            <div class="artist-right">
                <h2 class="artist-name">Louis<br>Tomlinson</h2>
                <p class="artist-subtext">y los mejores fan proyects</p>
            </div>
        </div>

        <footer>
            <div class="credits-author">
                By Luna M Cruz
            </div>

            <div class="cta-audio-container">
                <button class="btn-buy" id="buy-btn">Buy Now</button>
                <div class="audio-status" id="audio-tag">♫ Presiona para activar música</div>
            </div>

            <div class="barcode" aria-hidden="true">
                <span></span><span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span><span></span>
            </div>
        </footer>

    </main>

    <script>
        const music = document.getElementById('bg-music');
        const buyBtn = document.getElementById('buy-btn');
        const audioTag = document.getElementById('audio-tag');

        // Intentar cargar e inicializar el archivo de audio local asignado
        let audioFile = new Audio("Louis Tomlinson Silver tongues.mp3");
        audioFile.loop = true;

        buyBtn.addEventListener('click', () => {
            audioFile.play().then(() => {
                audioTag.innerText = "♫ Escuchando: Silver Tongues";
                audioTag.style.color = "#E00C78";
            }).catch(error => {
                // Fallback automático por si el navegador bloquea estrictamente la ruta local en el entorno del cliente
                music.play();
                audioTag.innerText = "♫ Audio activado con éxito";
            });
        });
    </script>

</body>
</html>
