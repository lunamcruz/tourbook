<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourbook - Recap de Puro Concierto</title>
    <!-- Importación de tipografías -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --text-white: #FFFFFF;
            --pink-magenta: #C2006B;
            --overlay-dark: rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .landing-container {
            position: relative;
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(to bottom, var(--overlay-dark), rgba(0,0,0,0.5)), url('louis1.jpg') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2.5rem 2rem 1.5rem 2rem;
        }

        /* --- Encabezado --- */
        header {
            text-align: center;
            width: 100%;
        }

        .main-title {
            font-family: 'Cinzel Decorative', serif;
            font-size: 5rem;
            font-weight: 700;
            color: var(--text-white);
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 0.95;
        }

        .subtitle {
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-white);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.2rem;
        }

        /* --- Contenido Central --- */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr;
            width: 100%;
            margin-top: 1rem;
            margin-bottom: auto;
        }

        .quote-left {
            font-family: 'Alex Brush', cursive;
            font-size: 3.2rem;
            line-height: 1.1;
            color: var(--text-white);
            max-width: 420px;
            letter-spacing: 1px;
            margin-top: 1.5rem;
        }

        .artist-right {
            justify-self: end;
            text-align: right;
            max-width: 400px;
            margin-top: 3rem;
        }

        .artist-name {
            font-family: 'Cinzel Decorative', serif;
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--pink-magenta);
            text-transform: uppercase;
            line-height: 0.9;
            letter-spacing: 1px;
            margin-bottom: 0.3rem;
        }

        .artist-subtext {
            font-family: 'Alex Brush', cursive;
            font-size: 3.5rem;
            color: var(--text-white);
            line-height: 1;
            letter-spacing: 1px;
        }

        /* --- Reproductor de Música --- */
        .audio-player-container {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 15px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 360px;
            margin-top: 2rem;
        }

        /* Miniatura del disco giratorio */
        .vinyl-thumb {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-image: url('https://shopde.louis-tomlinson.com/cdn/shop/files/Louis-Tomlinson_Faith-In-The-Future_Picture-Disc_s519542_o7847358_a604096_v13730669.7c94ad95.png?v=1764158796&width=1080');
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            animation: spin 4s linear infinite;
        }

        audio {
            height: 32px;
            width: 100%;
        }

        /* Animación de rotación continua */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* --- Footer --- */
        footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            margin-top: 2rem;
            gap: 1rem;
        }

        .credits-author {
            font-family: 'Alex Brush', cursive;
            font-size: 3rem;
            color: var(--text-white);
            letter-spacing: 1px;
        }

        .barcode {
            display: flex;
            background-color: var(--text-white);
            padding: 4px 10px;
            height: 48px;
            align-items: center;
        }
        
        .barcode span {
            display: inline-block;
            background-color: #000;
            height: 100%;
            margin-right: 2px;
        }
        .barcode span:nth-child(odd) { width: 1px; }
        .barcode span:nth-child(even) { width: 3px; }
        .barcode span:nth-child(3n) { width: 4px; }
        .barcode span:nth-child(4n) { width: 2px; }
        .barcode span:last-child { margin-right: 0; }

        /* --- Responsividad --- */
        @media (min-width: 768px) {
            .landing-container {
                padding: 3rem 4rem 2rem 4rem;
            }

            .main-title { font-size: 7.5rem; }
            .subtitle { font-size: 2rem; }

            .content-grid {
                grid-template-columns: 1fr 1fr;
                align-items: start;
                margin-top: 3rem;
            }

            .quote-left {
                font-size: 4.5rem;
                max-width: 500px;
            }

            .artist-right { margin-top: 8rem; }
            .artist-name { font-size: 4.5rem; }
            .artist-subtext { font-size: 4.5rem; }

            footer {
                flex-direction: row;
                align-items: flex-end;
            }

            .audio-player-container {
                margin-top: 0;
                position: relative;
                bottom: -5px;
            }
        }

        @media (max-width: 480px) {
            .main-title { font-size: 3.8rem; }
            .subtitle { font-size: 1.1rem; }
            .quote-left { font-size: 2.8rem; }
            .artist-name { font-size: 2.8rem; }
            .artist-subtext { font-size: 2.8rem; }
            .audio-player-container { max-width: 100%; }
        }
    </style>
</head>
<body>

    <main class="landing-container">
        
        <header>
            <h1 class="main-title">Tourbook</h1>
            <p class="subtitle">Recap de Puro Concierto</p>
        </header>

        <div class="content-grid">
            <div class="quote-left">
                Podría escribir mi autobiografía, pero los conciertos son mejores
            </div>
            
            <div class="artist-right">
                <h2 class="artist-name">Louis<br>Tomlinson</h2>
                <p class="artist-subtext">y los mejores fan proyects</p>
            </div>
        </div>

        <footer>
            <!-- Contenedor del Reproductor con Miniatura y Controles -->
            <div class="audio-player-container">
                <div class="vinyl-thumb" title="Louis Tomlinson - Faith In The Future Picture Disc"></div>
                <audio controls src="silvertongues.mp3">
                    Tu navegador no soporta el elemento de audio.
                </audio>
            </div>

            <div class="credits-author">
                By Luna M Cruz
            </div>

            <div class="barcode" aria-hidden="true">
                <span></span><span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span><span></span>
            </div>
        </footer>

    </main>

</body>
</html>
