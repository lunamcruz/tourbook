<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourbook - Recap de Puro Concierto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --text-white: #FFFFFF;
            --pink-magenta: #C2006B;
            --overlay-dark: rgba(0, 0, 0, 0.35);
            --bg-black: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: sans-serif;
            overflow-x: hidden;
        }

        /* --- Portada con mayor margen interno (Textos centrados) --- */
        .hero-section {
            position: relative;
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(to bottom, var(--overlay-dark), rgba(0,0,0,0.7)), url('louis1.jpg') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 3rem 12% 2rem 12%; /* Ajuste aquí: empuja el texto hacia el centro */
            cursor: pointer;
        }

        header {
            text-align: center;
            width: 100%;
            pointer-events: none;
        }

        .main-title {
            font-family: 'Cinzel Decorative', serif;
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            line-height: 0.95;
        }

        .subtitle {
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-top: 0.2rem;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr;
            width: 100%;
            margin-top: 2rem;
            margin-bottom: auto;
            pointer-events: none;
            gap: 2rem;
        }

        .quote-left {
            font-family: 'Alex Brush', cursive;
            font-size: 3rem;
            line-height: 1.2;
            max-width: 420px;
            letter-spacing: 1px;
        }

        .artist-right {
            justify-self: end;
            text-align: right;
            max-width: 400px;
        }

        .artist-name {
            font-family: 'Cinzel Decorative', serif;
            font-size: 3.2rem;
            font-weight: 700;
            color: var(--pink-magenta);
            text-transform: uppercase;
            line-height: 0.95;
            letter-spacing: 1px;
            margin-bottom: 0.3rem;
        }

        .artist-subtext {
            font-family: 'Alex Brush', cursive;
            font-size: 3.2rem;
            line-height: 1;
            letter-spacing: 1px;
        }

        .audio-player-container {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.75);
            padding: 10px 15px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 360px;
            margin-top: 2rem;
            pointer-events: auto;
        }

        .vinyl-thumb {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-image: url('https://shopde.louis-tomlinson.com/cdn/shop/files/Louis-Tomlinson_Faith-In-The-Future_Picture-Disc_s519542_o7847358_a604096_v13730669.7c94ad95.png?v=1764158796&width=1080');
            background-size: cover;
            background-position: center;
            animation: spin 4s linear infinite;
            animation-play-state: paused;
        }

        audio {
            height: 32px;
            width: 100%;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            margin-top: 2rem;
            gap: 1.5rem;
            pointer-events: none;
        }

        .credits-author {
            font-family: 'Alex Brush', cursive;
            font-size: 2.8rem;
            letter-spacing: 1px;
        }

        .barcode {
            display: flex;
            background-color: var(--text-white);
            padding: 4px 10px;
            height: 48px;
            align-items: center;
        }
        
        .barcode span {
            display: inline-block;
            background-color: #000;
            height: 100%;
            margin-right: 2px
